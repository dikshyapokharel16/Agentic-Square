<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Furniture AR</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.3.1/dist/model-viewer.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #eef1ef;
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    /* The only screen this site has - a background image with AR-launch
       buttons pinned on top of it. No intro, no chat mockup, no "back to
       start" - each visitor scans this straight from a physical sign, so
       there is nothing else on the site to navigate to or flash while
       loading. */
    .furniture-gallery {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 16px;
    }

    .furniture-frame {
      position: relative;
      width: min(100%, calc(100vh * (4000 / 2397)));
      aspect-ratio: 4000 / 2397;
      max-height: 100vh;
    }

    .furniture-bg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .furniture-hint {
      position: absolute;
      left: 50%;
      top: 11%;
      transform: translateX(-50%);
      margin: 0;
      width: 100%;
      font-size: clamp(13px, 1.4vw, 16px);
      color: #333;
      text-align: center;
      pointer-events: none;
    }

    .furniture-ar-btn {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: #35664c;
      color: #fff;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .25);
      transition: transform .15s ease;
    }

    .furniture-ar-btn:active {
      transform: translate(-50%, -50%) scale(.9);
    }

    .furniture-ar-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid #35664c;
      animation: furniture-pulse 1.8s ease-out infinite;
      pointer-events: none;
    }

    @keyframes furniture-pulse {
      0% { transform: scale(1); opacity: .7; }
      100% { transform: scale(1.9); opacity: 0; }
    }

    .furniture-ar-btn[data-idx="0"] { left: 11.3%; top: 29%; }
    .furniture-ar-btn[data-idx="1"] { left: 36%;   top: 29%; }
    .furniture-ar-btn[data-idx="2"] { left: 66%;   top: 29%; }
    .furniture-ar-btn[data-idx="3"] { left: 91.8%; top: 29%; }
    .furniture-ar-btn[data-idx="4"] { left: 11.3%; top: 78%; }
    .furniture-ar-btn[data-idx="5"] { left: 35.5%; top: 78%; }
    .furniture-ar-btn[data-idx="6"] { left: 66%;   top: 78%; }
    .furniture-ar-btn[data-idx="7"] { left: 94.3%; top: 78%; }

    /* Phone: FINAL FURNITURE Phone.png is portrait, 2 cols x 4 rows, and the
       row order differs (Table Tennis/Jumping Brickwall come before Wooden
       Benches/Stepped Playground) - so each index's position is remapped
       individually rather than just adding rows. */
    @media (max-width: 700px) {
      .furniture-frame {
        width: min(100%, calc(100vh * (1125 / 2436)));
        aspect-ratio: 1125 / 2436;
      }

      .furniture-ar-btn {
        width: 42px;
        height: 42px;
        font-size: 1.2rem;
      }

      .furniture-ar-btn[data-idx="0"] { left: 27%; top: 14.5%; }
      .furniture-ar-btn[data-idx="1"] { left: 73%; top: 14.5%; }
      .furniture-ar-btn[data-idx="2"] { left: 27%; top: 62.5%; }
      .furniture-ar-btn[data-idx="3"] { left: 73%; top: 62.5%; }
      .furniture-ar-btn[data-idx="4"] { left: 27%; top: 40%;   }
      .furniture-ar-btn[data-idx="5"] { left: 73%; top: 40%;   }
      .furniture-ar-btn[data-idx="6"] { left: 27%; top: 82.5%; }
      .furniture-ar-btn[data-idx="7"] { left: 73%; top: 82.5%; }

      .furniture-hint {
        top: 3.8%;
      }
    }

    /* AR-only, never shown inline - one per furniture piece. Kept off-screen
       rather than display:none since some browsers won't run WebXR/AR
       activation on a non-rendered element. */
    .furniture-ar-viewer {
      position: absolute;
      width: 10px;
      height: 10px;
      left: -9999px;
      top: -9999px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="furniture-gallery">
    <div class="furniture-frame">
      <picture>
        <source media="(max-width: 700px)" srcset="Furnitures/FINAL%20FURNITURE%20Phone.png">
        <img src="Furnitures/FINAL%20FURNITURE.png" class="furniture-bg" alt="Furniture pieces" />
      </picture>
      <p class="furniture-hint">Touch the icon to view it in AR</p>
      <button class="furniture-ar-btn" data-idx="0" aria-label="View Pallet Planters in AR"><i class="ti ti-augmented-reality"></i></button>
      <button class="furniture-ar-btn" data-idx="1" aria-label="View Pallet Seatings in AR"><i class="ti ti-augmented-reality"></i></button>
      <button class="furniture-ar-btn" data-idx="2" aria-label="View Wooden Benches in AR"><i class="ti ti-augmented-reality"></i></button>
      <button class="furniture-ar-btn" data-idx="3" aria-label="View Stepped Playground in AR"><i class="ti ti-augmented-reality"></i></button>
      <button class="furniture-ar-btn" data-idx="4" aria-label="View Table Tennis in AR"><i class="ti ti-augmented-reality"></i></button>
      <button class="furniture-ar-btn" data-idx="5" aria-label="View Jumping Brickwall in AR"><i class="ti ti-augmented-reality"></i></button>
      <button class="furniture-ar-btn" data-idx="6" aria-label="View Sand Box in AR"><i class="ti ti-augmented-reality"></i></button>
      <button class="furniture-ar-btn" data-idx="7" aria-label="View Brick Stand in AR"><i class="ti ti-augmented-reality"></i></button>
    </div>
  </div>

  <div id="furnitureArViewers"></div>

  <script src="furniture.js"></script>
</body>
</html>
